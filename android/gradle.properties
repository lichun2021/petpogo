# 增加堆内存，并强制启用 TLS 1.2（修复 dl.google.com TLS 握手失败）
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dhttps.protocols=TLSv1.2,TLSv1.3 -Djavax.net.debug=none
android.useAndroidX=true

# 跳过 Gradle 版本检查（避免 agp 版本冲突时的网络请求）
android.suppressUnsupportedOptionWarnings=android.suppressUnsupportedOptionWarnings
