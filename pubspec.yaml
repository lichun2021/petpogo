name: petpogo_app
description: PetPogo - Pet Hardware & Community App
publish_to: 'none'
version: 1.0.8+8

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^17.2.3

  # Network
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Tencent IM SDK（仅 API，UI 保持 PetPogo 自有风格）
  tencent_cloud_chat_sdk: ^8.0.0
  crypto: ^3.0.3        # DebugUserSig: HMAC-SHA256 签名
  archive: ^4.0.9      # DebugUserSig: ZLib 压缩

  # Local Storage
  flutter_secure_storage: ^10.1.0
  hive_flutter: ^1.1.0

  # UI & Animations
  google_fonts: ^8.1.0
  flutter_staggered_grid_view: ^0.7.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Media
  image_picker: ^1.1.2
  video_player: ^2.8.6
  record: ^6.0.0
  path_provider: ^2.1.2        # 获取临时目录存储录音文件
  just_audio: ^0.10.5

  # QR Scanner & Generator
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0     # 生成用户名片二维码
  emoji_picker_flutter: ^4.4.0  # 跨平台一致表情选择器

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  permission_handler: ^12.0.1
  connectivity_plus: ^7.1.1
  package_info_plus: ^9.0.1

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
