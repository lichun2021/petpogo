name: petpogo_app
description: PetPogo - Pet Hardware & Community App
publish_to: 'none'
version: 1.0.8+8

environment:
  sdk: '>=3.0.0 <4.0.0'

fluwx:
  app_id: 'wx02094a124e425dfe'
  debug_logging: true
  ios:
    universal_link: https://www.jxpetai.com/
    no_pay: true

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^17.2.3

  # Network
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Tencent IM SDK（仅 API，UI 保持 PetPogo 自有风格）
  tencent_cloud_chat_sdk: ^8.0.0
  crypto: ^3.0.3        # DebugUserSig: HMAC-SHA256 签名
  archive: ^4.0.9      # DebugUserSig: ZLib 压缩

  # Local Storage
  flutter_secure_storage: ^10.1.0
  hive_flutter: ^1.1.0

  # UI & Animations
  google_fonts: ^8.1.0
  flutter_staggered_grid_view: ^0.7.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  flutter_markdown: ^0.7.4      # AI 消息 Markdown 渲染
  flutter_widget_from_html: ^0.17.2  # 渲染 HTML 文档（协议/帮助页）
  webview_flutter: ^4.0.0       # DocReaderPage：渲染 HTTP 网页

  # Media
  image_picker: ^1.1.2
  image_cropper: ^9.0.0
  # 高德地图（flutter_map + 高德瓦片 URL）
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  video_player: ^2.8.6
  # media_kit — 软解码播放器，支持 H.264 High Profile 等所有格式
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_android_video: ^1.3.3   # Android 软解码库

  record: ^6.0.0
  path_provider: ^2.1.2        # 获取临时目录存储录音文件
  just_audio: ^0.10.5
  agora_rtc_engine: ^6.3.2    # 机器人视频推流（ESP32 JPEG 流，仅 Android）

  # QR Scanner & Generator
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0     # 生成用户名片二维码
  emoji_picker_flutter: ^4.4.0  # 跨平台一致表情选择器

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  permission_handler: ^12.0.1
  connectivity_plus: ^7.1.1
  network_info_plus: ^6.0.0
  package_info_plus: ^9.0.1

  # Icons
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.5.5
  gal: ^2.3.2
  jpush_flutter: ^3.4.5
  app_links: ^7.0.0
  fluwx: ^5.7.5
  share_plus: ^12.0.2
  android_intent_plus: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/fonts/pet_breeds.json
    - assets/docs/

  fonts:
    - family: AZhuBubble
      fonts:
        - asset: assets/fonts/AZhuBubble.ttf
          weight: 500
